apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "kotlin-android"
// Apply Firebase plugin only when google-services.json is present
if (file("google-services.json").exists()) {
    apply plugin: "com.google.gms.google-services"
}

/**
 * React Native Gradle Plugin config.
 * https://reactnative.dev/docs/next/new-architecture-intro
 */
react {
    /* Folders */
    // root = file("../")
    // reactNativeDir = file("../node_modules/react-native")
    // codegenDir = file("../node_modules/@react-native/codegen")
    // cliFile = file("../node_modules/.bin/react-native")

    /* Bundler */
    // bundleCommand = "ram-bundle"

    /* Hermes (recommended — faster startup) */
    hermesEnabled = true
}

/**
 * Keystore — read from local.properties or CI env vars.
 * Create local.properties (gitignored) with:
 *   KEYSTORE_FILE=riserank.keystore
 *   KEYSTORE_PASSWORD=...
 *   KEY_ALIAS=riserank
 *   KEY_PASSWORD=...
 */
def keystorePropertiesFile = rootProject.file("local.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.riserank.app"

    defaultConfig {
        applicationId "com.riserank.app"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 3
        versionName "1.1.0"
        // Multidex required when minSdk < 21 — kept for safety
        multiDexEnabled true
    }

    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
        release {
            if (keystoreProperties.containsKey("KEYSTORE_FILE")) {
                storeFile file(keystoreProperties["KEYSTORE_FILE"])
                storePassword keystoreProperties["KEYSTORE_PASSWORD"]
                keyAlias keystoreProperties["KEY_ALIAS"]
                keyPassword keystoreProperties["KEY_PASSWORD"]
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            // Enable R8 shrinking for debug if you want faster iteration; off by default
            minifyEnabled false
        }
        release {
            // Minify + shrink resources
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

dependencies {
    // React Native core
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // AndroidX
    implementation("androidx.multidex:multidex:2.0.1")
    implementation("androidx.core:core-ktx:1.13.0")
    implementation("androidx.appcompat:appcompat:1.6.1")
    implementation("androidx.core:core-splashscreen:1.0.1")

    // Firebase (BOM keeps all Firebase libs version-consistent)
    if (file("google-services.json").exists()) {
        implementation platform("com.google.firebase:firebase-bom:33.0.0")
        implementation("com.google.firebase:firebase-messaging")
        implementation("com.google.firebase:firebase-analytics")
    }
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle")
applyNativeModulesAppBuildGradle(project)
