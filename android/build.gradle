// Top-level build file — configuration shared across all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion    = 23          // Android 6.0+ (covers 98 %+ of active devices)
        compileSdkVersion = 35
        targetSdkVersion  = 35
        ndkVersion        = "26.1.10909125"
        kotlinVersion     = "1.9.22"
        // react-native-google-mobile-ads reads this from google-services.json via the
        // google-services plugin. Since we ship without google-services.json we set it
        // to null here so the library's build.gradle `if (rootProject.ext.googleMobileAdsJson)`
        // check short-circuits cleanly. The real App ID is in AndroidManifest.xml.
        googleMobileAdsApplicationId = "ca-app-pub-4897943258060219~7356146761"
        googleMobileAdsJson = null
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.3.0")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        // Firebase — google-services plugin (requires google-services.json in app/)
        classpath("com.google.gms:google-services:4.4.1")
    }
}

apply plugin: "com.facebook.react.rootproject"
